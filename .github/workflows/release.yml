name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to attach assets to the release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sanity-check the build
        run: |
          test -s dist/simple-compact-thermostat.js \
            || (echo "::error::dist/simple-compact-thermostat.js missing or empty"; exit 1)

      - name: Create GitHub Release with built asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/simple-compact-thermostat.js
          generate_release_notes: true
          fail_on_unmatched_files: true
